# packages/brief.yaml
#
# Main entry point for Briefing System Package
# Combines all brief-related automations, scripts, sensors, and configurations
#
# Phase 3 Complete: Entity Validation & Configuration-Driven Orchestration
# Last Updated: 2025-11-07
#
# This file merges components from:
# - brief/config_loader.yaml (Phase 1: Configuration)
# - brief/health_monitoring.yaml (Phase 1: Health monitoring)
# - brief/validator.yaml (Phase 1: Validation automation)
# - brief/sensors.yaml (Phase 1: Sensor definitions)
# - brief/orchestration_enhanced.yaml (Phase 3.2: Main script)
# - brief/data_collectors.yaml (Phase 1-2: Original collectors)
# - brief/helpers/* (Phase 2: Helper scripts)
# - brief/collectors/* (Phase 3.1: Enhanced collectors)

# =============================================================================
# CONFIGURATION LOADING (Phase 1)
# =============================================================================
# Template sensors that store configuration in Home Assistant state
template: !include brief/config_loader.yaml

# =============================================================================
# VALIDATION SYSTEM (Phase 1)
# =============================================================================
automation: !include brief/validator.yaml

# =============================================================================
# MAIN ORCHESTRATION - PHASE 3.2 (Configuration-Driven)
# =============================================================================
# This is the main script that coordinates all data collection
script: !include brief/orchestration_enhanced.yaml
