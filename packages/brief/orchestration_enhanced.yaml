# packages/brief/orchestration_enhanced.yaml
#
# Enhanced Orchestration - Phase 3.2
# Configuration-driven collection with improved error handling
# Based on: https://www.home-assistant.io/docs/scripts/
#
# Last Updated: 2025-11-07

script:
  brief_build_prompt_safe:
    alias: "Build Prompt (Safe with Config-Driven Collection)"
    description: "Orchestrates data collection with configuration validation"
    mode: single
    variables:
      # Load configuration from config_loader
      config_modules: "{{ state_attr('sensor.brief_config_modules', None) | default({}) }}"
      config_timeouts: "{{ state_attr('sensor.brief_config_timeouts', None) | default({}) }}"
      collector_timeout: "{{ config_timeouts.get('collector_timeout', 15) }}"
      build_prompt_timeout: "{{ config_timeouts.get('build_prompt_timeout', 30) }}"

      # Get enabled modules from config
      chores_enabled: "{{ config_modules.get('chores', true) }}"
      appliances_enabled: "{{ config_modules.get('appliances', false) }}"
      meals_enabled: "{{ config_modules.get('meals', true) }}"
      commute_enabled: "{{ config_modules.get('commute', true) }}"
      devices_enabled: "{{ config_modules.get('device_health', true) }}"
      calendar_enabled: "{{ config_modules.get('calendar', true) }}"
      garbage_enabled: "{{ config_modules.get('garbage', true) }}"
      air_quality_enabled: "{{ config_modules.get('air_quality', true) }}"

      # Context variables
      is_morning: "{{ now().hour < 12 }}"
      is_afternoon: "{{ now().hour >= 12 and now().hour < 17 }}"
      is_evening: "{{ now().hour >= 17 }}"
      is_weekday: "{{ now().weekday() < 5 }}"
      current_time: "{{ now().strftime('%H:%M') }}"

    sequence:
      # Log execution start
      - service: mqtt.publish
        data:
          topic: "home/brief/execution/start"
          payload: >
            {{
              {
                "timestamp": now().isoformat(),
                "enabled_modules": {
                  "chores": chores_enabled,
                  "appliances": appliances_enabled,
                  "meals": meals_enabled,
                  "commute": commute_enabled,
                  "devices": devices_enabled,
                  "calendar": calendar_enabled,
                  "garbage": garbage_enabled,
                  "air_quality": air_quality_enabled
                }
              } | tojson
            }}

      # ====================================================================
      # PHASE 1: Collect Data (Parallel with Config-Driven Selection)
      # ====================================================================
      - parallel:
          # Chores collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ chores_enabled }}"
            then:
              - service: script.brief_collect_chores_safe
                data:
                  enabled: true
                  timeout_seconds: "{{ collector_timeout }}"
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_chores"
                  timeout_seconds: "{{ collector_timeout }}"

          # Appliances collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ appliances_enabled }}"
            then:
              - service: script.brief_collect_appliances_safe
                data:
                  enabled: true
                  timeout_seconds: "{{ collector_timeout }}"
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_appliances"
                  timeout_seconds: "{{ collector_timeout }}"

          # Meals collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ meals_enabled }}"
            then:
              - service: script.brief_collect_meals_safe
                data:
                  enabled: true
                  timeout_seconds: "{{ collector_timeout }}"
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_meals"
                  timeout_seconds: "{{ collector_timeout }}"

          # Commute collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ commute_enabled }}"
            then:
              - service: script.brief_collect_commute_safe
                data:
                  enabled: true
                  timeout_seconds: "{{ collector_timeout }}"
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_commute"
                  timeout_seconds: "{{ collector_timeout }}"

          # Devices collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ devices_enabled }}"
            then:
              - service: script.brief_collect_devices_safe
                data:
                  enabled: true
                  timeout_seconds: "{{ collector_timeout }}"
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_devices"
                  timeout_seconds: "{{ collector_timeout }}"

          # Calendar collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ calendar_enabled }}"
            then:
              - service: script.brief_collect_calendar
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_calendar"
                  timeout_seconds: "{{ collector_timeout }}"

          # Garbage collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ garbage_enabled }}"
            then:
              - service: script.brief_collect_garbage
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_garbage"
                  timeout_seconds: "{{ collector_timeout }}"

          # Air quality collector (if enabled)
          - if:
              - condition: template
                value_template: "{{ air_quality_enabled }}"
            then:
              - service: script.brief_collect_air_quality
              - service: script.brief_wait_for_mqtt_sensor
                data:
                  sensor_name: "sensor.brief_data_air_quality"
                  timeout_seconds: "{{ collector_timeout }}"

      # ====================================================================
      # PHASE 2: Get Weather (Always Needed)
      # ====================================================================
      - service: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: "{{ state_attr('sensor.brief_config_entity_references', 'weather') | default('weather.forecast_home') }}"
        response_variable: hourly_forecast

      # ====================================================================
      # PHASE 3: Build Prompt from Collected Data
      # ====================================================================
      - variables:
          # Read all collected MQTT data
          chores_data: >
            {%- set raw_data = state_attr('sensor.brief_data_chores', None) | default({}) -%}
            {%- if raw_data is string -%}
              {%- set data = raw_data | from_json -%}
            {%- else -%}
              {%- set data = raw_data -%}
            {%- endif -%}
            {%- if data.get('validation_status') == 'success' or data.get('validation_status') == 'partial' -%}
              {{ data }}
            {%- else -%}
              {}
            {%- endif -%}

          appliances_data: >
            {%- if appliances_enabled -%}
              {%- set data = state_attr('sensor.brief_data_appliances', None) | default({}) -%}
              {%- if data.get('validation_status') == 'success' or data.get('validation_status') == 'partial' -%}
                {{ data }}
              {%- else -%}
                {}
              {%- endif -%}
            {%- else -%}
              {}
            {%- endif -%}

          meals_data: >
            {%- if meals_enabled -%}
              {%- set data = state_attr('sensor.brief_data_meals', None) | default({}) -%}
              {%- if data.get('validation_status') == 'success' or data.get('validation_status') == 'partial' -%}
                {{ data }}
              {%- else -%}
                {}
              {%- endif -%}
            {%- else -%}
              {}
            {%- endif -%}

          commute_data: >
            {%- if commute_enabled -%}
              {%- set data = state_attr('sensor.brief_data_commute', None) | default({}) -%}
              {%- if data.get('validation_status') == 'success' or data.get('validation_status') == 'partial' -%}
                {{ data }}
              {%- else -%}
                {}
              {%- endif -%}
            {%- else -%}
              {}
            {%- endif -%}

          devices_data: >
            {%- if devices_enabled -%}
              {%- set raw_data = state_attr('sensor.brief_data_devices', None) | default({}) -%}
              {%- if raw_data is string -%}
                {%- set data = raw_data | from_json -%}
              {%- else -%}
                {%- set data = raw_data -%}
              {%- endif -%}
              {%- if data.get('validation_status') == 'success' -%}
                {{ data }}
              {%- else -%}
                {}
              {%- endif -%}
            {%- else -%}
              {}
            {%- endif -%}

          calendar_data: >
            {%- if calendar_enabled -%}
              {{ state_attr('sensor.brief_data_calendar', None) | default({}) }}
            {%- else -%}
              {}
            {%- endif -%}

          garbage_data: >
            {%- if garbage_enabled -%}
              {{ state_attr('sensor.brief_data_garbage', None) | default({}) }}
            {%- else -%}
              {}
            {%- endif -%}

          air_quality_data: >
            {%- if air_quality_enabled -%}
              {{ state_attr('sensor.brief_data_air_quality', None) | default({}) }}
            {%- else -%}
              {}
            {%- endif -%}

      # Build prompt sections
      - variables:
          prompt_sections: >
            {% set ns = namespace(sections=[]) %}

            {# Base instructions with date/time context #}
            {% set ns.sections = ns.sections + ['Instructions for generating home status briefs:'] %}
            {% set ns.sections = ns.sections + ['- Create a concise, conversational brief'] %}
            {% set ns.sections = ns.sections + ['- Avoid technical terms and Home Assistant terminology'] %}
            {% set ns.sections = ns.sections + ['- Round numbers naturally (say "around 3" instead of "2.87")'] %}
            {% set ns.sections = ns.sections + ['- Response should be close to but less than 255 characters'] %}
            {% set ns.sections = ns.sections + [''] %}

            {# Date/time context #}
            {% set ns.sections = ns.sections + ['CURRENT DATE/TIME CONTEXT:'] %}
            {% set ns.sections = ns.sections + ['- Current date: ' + now().strftime('%A, %B %d, %Y')] %}
            {% set ns.sections = ns.sections + ['- Current time: ' + current_time] %}
            {% set ns.sections = ns.sections + ['- Time of day: ' + ('morning' if is_morning else 'afternoon' if is_afternoon else 'evening')] %}
            {% set ns.sections = ns.sections + ['- ' + ('Weekday' if is_weekday else 'Weekend')] %}
            {% set ns.sections = ns.sections + [''] %}

            {# Weather (always include if available) #}
            {% if hourly_forecast %}
              {% set weather_condition = hourly_forecast['weather.forecast_home'].forecast[0].condition %}
              {% set ns.sections = ns.sections + ['Current weather: ' + weather_condition] %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Commute section (if enabled and relevant) #}
            {% if commute_data.get('relevant', false) %}
              {% set ns.sections = ns.sections + ['Commute times:'] %}
              {% if commute_data.get('brian_time') != 'N/A' and commute_data.get('brian_time') %}
                {% set ns.sections = ns.sections + ['- Brian to work: ' + (commute_data.brian_time | string) + ' minutes'] %}
              {% endif %}
              {% if commute_data.get('hester_time') != 'N/A' and commute_data.get('hester_time') %}
                {% set ns.sections = ns.sections + ['- Hester to work: ' + (commute_data.hester_time | string) + ' minutes'] %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Calendar events (if enabled and available) #}
            {% if calendar_data.get('events', []) %}
              {% set ns.sections = ns.sections + ['Upcoming events:'] %}
              {% for event in calendar_data.events %}
                {% set ns.sections = ns.sections + ['- ' + event.formatted_date + ': ' + event.summary + ' at ' + event.formatted_time] %}
              {% endfor %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Garbage reminders (if enabled and relevant) #}
            {% if garbage_data.get('relevant', false) %}
              {% set ns.sections = ns.sections + [garbage_data.get('reminder_message', '')] %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Meal planning (if enabled and available) #}
            {% if meals_data.get('has_today', false) or meals_data.get('has_tomorrow', false) %}
              {% set ns.sections = ns.sections + ['Meal planning:'] %}
              {% if meals_data.get('has_today', false) and meals_data.get('today') %}
                {% for meal_type, meal in meals_data.today.items() %}
                  {% set ns.sections = ns.sections + ['- Today ' + meal_type + ': ' + meal] %}
                {% endfor %}
              {% endif %}
              {% if meals_data.get('has_tomorrow', false) and meals_data.get('tomorrow') %}
                {% for meal_type, meal in meals_data.tomorrow.items() %}
                  {% set ns.sections = ns.sections + ['- Tomorrow ' + meal_type + ': ' + meal] %}
                {% endfor %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Chores (if enabled) #}
            {% if chores_data and chores_data.get('validation_status') != 'disabled' %}
              {# Daily dishwasher #}
              {% if chores_data.get('daily', {}).get('dishwasher', {}).get('relevant', false) and not chores_data.get('daily', {}).get('dishwasher', {}).get('completed', false) %}
                {% set ns.sections = ns.sections + ['- ' + chores_data.daily.dishwasher.assignee + ' needs to empty the dishwasher'] %}
              {% endif %}
              {# Weekend bathroom #}
              {% if chores_data.get('weekend', {}).get('bathroom', {}).get('relevant', false) and not chores_data.get('weekend', {}).get('bathroom', {}).get('completed', false) %}
                {% set ns.sections = ns.sections + ['- ' + chores_data.weekend.bathroom.assignee + ' needs to clean the bathroom'] %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Appliances (if enabled) #}
            {% if appliances_data and appliances_data.get('dishwasher', {}).get('maintenance', {}).get('relevant', false) %}
              {% set ns.sections = ns.sections + ['Dishwasher maintenance needed:'] %}
              {% if appliances_data.dishwasher.maintenance.get('needs_salt', false) %}
                {% set ns.sections = ns.sections + ['- Needs salt refill'] %}
              {% endif %}
              {% if appliances_data.dishwasher.maintenance.get('needs_rinse_aid', false) %}
                {% set ns.sections = ns.sections + ['- Needs rinse aid refill'] %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Device issues (if enabled) #}
            {% if devices_data.get('has_issues', false) %}
              {% set ns.sections = ns.sections + ['Device issues:'] %}
              {% if devices_data.get('battery_count', 0) > 0 %}
                {% set ns.sections = ns.sections + ['- ' + devices_data.battery_count|string + ' devices with low battery'] %}
              {% endif %}
              {% if devices_data.get('offline_count', 0) > 0 %}
                {% set offline_devices = devices_data.get('offline_devices', []) %}
                {% if offline_devices | length > 0 %}
                  {% set device_names = offline_devices | map(attribute='name') | list %}
                  {% set ns.sections = ns.sections + ['- Critical devices offline: ' + device_names | join(', ')] %}
                {% else %}
                  {% set ns.sections = ns.sections + ['- ' + devices_data.offline_count|string + ' critical devices offline'] %}
                {% endif %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {# Air quality (if enabled) #}
            {% if air_quality_data.get('relevant', false) %}
              {% set ns.sections = ns.sections + ['Indoor air quality: ' + air_quality_data.get('summary', '')] %}
              {% if air_quality_data.get('trend') == 'worsening' %}
                {% set ns.sections = ns.sections + ['- Trend: Declining, monitor closely'] %}
              {% endif %}
              {% set ns.sections = ns.sections + [''] %}
            {% endif %}

            {{ ns.sections | join('\n') }}

      # Store built prompt
      - service: mqtt.publish
        data:
          topic: "home/brief/prompt"
          payload: >
            {{
              {
                "prompt": prompt_sections,
                "timestamp": now().isoformat(),
                "context": {
                  "is_morning": is_morning,
                  "is_weekday": is_weekday,
                  "has_issues": devices_data.get('has_issues', false)
                },
                "enabled_modules": {
                  "chores": chores_enabled,
                  "appliances": appliances_enabled,
                  "meals": meals_enabled,
                  "commute": commute_enabled,
                  "devices": devices_enabled,
                  "calendar": calendar_enabled,
                  "garbage": garbage_enabled,
                  "air_quality": air_quality_enabled
                }
              } | tojson
            }}

      # Return the built prompt
      - variables:
          result: "{{ prompt_sections }}"
