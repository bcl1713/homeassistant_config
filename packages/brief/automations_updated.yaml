# packages/brief/automations_updated.yaml
#
# Updated automations for modular briefing system
# Uses the new modular daily_brief script
#

automation:
  - alias: "notification_brief_morning"
    id: "notification_brief_morning"
    description: "Trigger modular brief in the morning"
    trigger:
      - platform: time
        at: "06:45:00"
    condition:
      - condition: time
        weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
    action:
      - service: script.daily_brief

  - alias: "notification_brief_evening"
    id: "notification_brief_evening"
    description: "Trigger modular brief in the evening"
    trigger:
      - platform: time
        at: "17:30:00"
    action:
      - service: script.daily_brief

  - alias: "notification_brief_calendar"
    id: "notification_brief_calendar"
    description: "Trigger modular brief 30 minutes before relevant calendar events"
    trigger:
      - platform: calendar
        event: start
        offset: "-00:30:00"
        entity_id: calendar.brian_personal
      - platform: calendar
        event: start
        offset: "-00:30:00"
        entity_id: calendar.family
      - platform: calendar
        event: start
        offset: "-00:30:00"
        entity_id: calendar.tk_activities
      - platform: calendar
        event: start
        offset: "-00:30:00"
        entity_id: calendar.porter_activities
    action:
      - service: script.daily_brief


  # New automation for testing the modular system
  - alias: "brief_system_health_check"
    id: "brief_system_health_check"
    description: "Monitor briefing system health"
    trigger:
      - platform: time_pattern
        hours: "/6" # Every 6 hours
    condition:
      - condition: template
        value_template: >
          {{ states('sensor.brief_context_summary') == 'Not Ready' }}
    action:
      - service: persistent_notification.create
        data:
          title: "Briefing System Issue"
          message: >
            The modular briefing system appears to have issues. Context: {{
            states('sensor.brief_context_summary') }} Last update: {{
            state_attr('sensor.brief_context_summary', 'last_generated') }}
          notification_id: briefing_system_health
